name: Migrate database

# Applies pending Prisma migrations to the hosted database. Unlike "Reseed demo
# database" this never deletes anything — it only runs migrations that have not
# been applied yet, so existing accounts and bookings are preserved.

on:
  push:
    branches: [main]
    paths:
      - 'backend/prisma/migrations/**'
      - 'backend/prisma/schema.prisma'
  workflow_dispatch:

concurrency:
  group: migrate
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run db:generate -w backend
      - run: npx prisma migrate deploy
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
      - run: npx prisma migrate status
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
